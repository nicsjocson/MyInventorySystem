<!DOCTYPE html>
<html>
<head><title>Add Bottle</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5">
    <div class="col-md-6 mx-auto">
        <h2>Add New Water Bottle</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label>Bottle Name/Model</label>
                <input type="text" name="bottle_name" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Select Supplier</label>
                <select name="supplier_id" class="form-select" required>
                    {% for supplier in suppliers %}
                        <option value="{{ supplier.pk }}">{{ supplier.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Confirm</button>
            <a href="{% url 'view_supplier' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</body>
</html>

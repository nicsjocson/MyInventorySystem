<!DOCTYPE html>
<html>
<head><title>Change Password</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5">
    <div class="col-md-4 mx-auto">
        <h2 class="text-center">Change Password</h2>
        {% if messages %}
            {% for message in messages %}<div class="alert alert-danger">{{ message }}</div>{% endfor %}
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <input type="password" name="current_password" class="form-control mb-3" placeholder="Current Password" required>
            <input type="password" name="new_password" class="form-control mb-3" placeholder="New Password" required>
            <input type="password" name="confirm_password" class="form-control mb-3" placeholder="Confirm New Password" required>
            <button type="submit" class="btn btn-primary w-100 mb-2">Confirm</button>
            <a href="{% url 'manage_account' account.pk %}" class="btn btn-secondary w-100">Cancel</a>
        </form>
    </div>
</body>
</html>

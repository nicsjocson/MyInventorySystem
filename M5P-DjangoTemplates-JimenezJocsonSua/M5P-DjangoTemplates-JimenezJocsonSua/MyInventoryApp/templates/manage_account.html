<!DOCTYPE html>
<html>
<head><title>Manage Account</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5 text-center">
    <h2>Account: {{ account.getUsername }}</h2>
    <div class="mt-4">
        <a href="{% url 'change_password' account.pk %}" class="btn btn-warning m-2">Change Password</a>
        <a href="{% url 'delete_account' account.pk %}" class="btn btn-danger m-2" onclick="return confirm('Delete account?');">Delete Account</a>
        <a href="{% url 'view_supplier' %}" class="btn btn-secondary m-2">Back</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html>
<head><title>Signup</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5">
    <div class="col-md-4 mx-auto">
        <h2 class="text-center">Signup</h2>
        {% if messages %}
            {% for message in messages %}<div class="alert alert-warning">{{ message }}</div>{% endfor %}
        {% endif %}
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
            <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
            <button type="submit" class="btn btn-success w-100 mb-2">Create Account</button>
            <a href="{% url 'login' %}" class="btn btn-outline-secondary w-100">Back to Login</a>
        </form>
    </div>
</body>
</html>

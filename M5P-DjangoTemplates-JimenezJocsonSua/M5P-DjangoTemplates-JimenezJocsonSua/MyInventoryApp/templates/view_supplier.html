<!DOCTYPE html>
<html>
<head><title>Suppliers</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5">
    <div class="d-flex justify-content-end mb-3">
        <a href="{% url 'add_bottle' %}" class="btn btn-success me-2">Add Water Bottles</a>
        <a href="{% url 'manage_account' account_id %}" class="btn btn-info me-2">Manage Account</a>
        <a href="{% url 'logout' %}" class="btn btn-danger">Logout</a>
    </div>

    <h2>Suppliers</h2>
    <ul class="list-group">
        {% for supplier in suppliers %}
            <a href="{% url 'view_bottles' %}" class="list-group-item list-group-item-action">
                {{ supplier.name }}
            </a>
        {% endfor %}
    </ul>
</body>
</html>
